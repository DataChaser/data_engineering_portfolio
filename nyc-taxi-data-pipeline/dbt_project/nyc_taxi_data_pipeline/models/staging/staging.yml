version: 2

models:
  - name: stg_trips
    description: "Cleaned and typed taxi trip records. Structurally broken rows filtered out."
    columns:
      - name: vendor_id
        description: "TPEP provider. 1=Creative Mobile Technologies, 2=Curb Mobility, 6=Myle Technologies, 7=Helix"
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 6, 7]

      - name: pickup_datetime
        description: "Date and time when the meter was engaged"
        tests:
          - not_null

      - name: dropoff_datetime
        description: "Date and time when the meter was disengaged"
        tests:
          - not_null

      - name: passenger_count
        description: "Number of passengers in the vehicle. Null for automated trips."

      - name: trip_distance
        description: "Elapsed trip distance in miles reported by the taximeter"
        tests:
          - not_null

      - name: pickup_location_id
        description: "TLC Taxi Zone where the taximeter was engaged"
        tests:
          - not_null
          - relationships:
              to: ref('stg_zone_lookup')
              field: location_id

      - name: dropoff_location_id
        description: "TLC Taxi Zone where the taximeter was disengaged"
        tests:
          - not_null
          - relationships:
              to: ref('stg_zone_lookup')
              field: location_id

      - name: rate_code_id
        description: "Final rate code at end of trip. 1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group ride, 99=Null/unknown"
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6, 99]

      - name: payment_type
        description: "How the passenger paid. 0=Flex Fare, 1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided trip"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3, 4, 5, 6]

      - name: fare_amount
        description: "Time-and-distance fare calculated by the meter"
        tests:
          - not_null

      - name: extra
        description: "Miscellaneous extras and surcharges"

      - name: mta_tax
        description: "Tax automatically triggered based on the metered rate in use"

      - name: tip_amount
        description: "Tip amount. Auto-populated for credit card tips only. Cash tips not included."

      - name: tolls_amount
        description: "Total amount of all tolls paid in trip"

      - name: improvement_surcharge
        description: "Improvement surcharge assessed at flag drop. Levied since 2015."

      - name: total_amount
        description: "Total amount charged to passengers. Does not include cash tips."
        tests:
          - not_null

      - name: congestion_surcharge
        description: "Total amount collected for NYS congestion surcharge"

      - name: airport_fee
        description: "pickup fee at LaGuardia and JFK airports only"

      - name: cbd_congestion_fee
        description: "Per-trip charge for MTA Congestion Relief Zone. Applies from January 5, 2025 onwards."

      - name: store_and_fwd_flag
        description: "Whether trip record was held in vehicle memory before sending. Y=store and forward, N=not store and forward"

      - name: source_month
        description: "Audit column — source file month"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-11', '2025-12', '2026-01']

      - name: trip_duration_minutes
        description: "Trip duration in minutes — derived from pickup and dropoff timestamps"
        tests:
          - not_null

      - name: pickup_date
        description: "Date only component of pickup datetime — used for daily aggregations in marts"
        tests:
          - not_null

  - name: stg_zone_lookup
    description: "TLC taxi zone dimension table. 265 rows mapping integer zone IDs to borough and zone names."
    columns:
      - name: location_id
        description: "Primary key — integer zone ID referenced by trip pickup and dropoff location IDs"
        tests:
          - not_null
          - unique

      - name: borough
        description: "NYC borough name"
        tests:
          - accepted_values:
              arguments:
                values: ['Manhattan', 'Brooklyn', 'Queens', 'Bronx', 'Staten Island', 'EWR', 'Unknown']

      - name: zone
        description: "Zone name within the borough"

      - name: service_zone
        description: "Service zone classification"