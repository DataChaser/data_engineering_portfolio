version: 2

sources:
  - name: raw
    database: TAXI_DB
    schema: RAW
    description: "Raw taxi data loaded directly from TLC source files. No transformations applied."

    tables:
      - name: raw_trips
        description: "Yellow taxi trip records -- one row per trip. Nov 2025 to Jan 2026."
        columns:
          - name: VENDORID
            description: "Taxi vendor ID -- 1 or 2"
          - name: TPEP_PICKUP_DATETIME
            description: "Trip pickup timestamp -- stored as VARCHAR in raw layer"
          - name: TPEP_DROPOFF_DATETIME
            description: "Trip dropoff timestamp -- stored as VARCHAR in raw layer"
          - name: FARE_AMOUNT
            description: "Meter fare -- stored as VARCHAR in raw layer"
          - name: SOURCE_MONTH
            description: "Audit column -- which monthly file this row came from"

      - name: raw_zone_lookup
        description: "TLC taxi zone lookup -- 265 rows mapping zone IDs to borough and zone names"
        columns:
          - name: LOCATIONID
            description: "Integer zone ID -- foreign key referenced by trip pickup and dropoff"
          - name: BOROUGH
            description: "NYC borough name"
          - name: ZONE
            description: "Zone name within borough"
          - name: SERVICE_ZONE
            description: "Service zone classification"