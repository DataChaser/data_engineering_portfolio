version: 2

models:
  - name: mart_economic_indicators
    description: "Final analytics table for the Economic Indicators dashboard. One row per indicator per date with MoM change pre-calculated."
    columns:
      - name: observation_date
        description: "Observation date"
        tests:
          - not_null

      - name: indicator_name
        description: "Human readable indicator name"
        tests:
          - not_null

      - name: value
        description: "Indicator value for this period"

      - name: prev_value
        description: "Indicator value for the previous period. Null for the first row of each indicator."

      - name: mom_change
        description: "Month on month change. Null for the first row of each indicator."